name: medical-ner
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.11
  - pip
  - pytorch>=2.0
  - torchvision
  - cudatoolkit=11.8
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.8
  - seaborn>=0.13
  - jupyter
  - pyyaml>=6.0
  - pytest>=7.4
  - pip:
      - transformers>=4.35
      - datasets>=2.14
      - tokenizers>=0.15
      - accelerate>=0.25
      - spacy>=3.7
      - wandb>=0.16
      - hydra-core>=1.3
      - typer>=0.9
      - seqeval>=1.2
      - nervaluate>=0.2
      - black>=23.0
      - ruff>=0.1
      - mypy>=1.7
