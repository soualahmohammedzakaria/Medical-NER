# ----------------------------------------------
# Medical-NER - master configuration
# ----------------------------------------------

project:
  name: medical-ner
  seed: 42

data:
  raw_dir: data/raw
  processed_dir: data/processed
  max_seq_length: 512
  label_list:
    - O
    - B-Chemical
    - I-Chemical
    - B-Disease
    - I-Disease

model:
  name: microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext
  num_labels: 5
  dropout: 0.1

training:
  learning_rate: 3.0e-5
  epochs: 5
  batch_size: 16
  weight_decay: 0.01
  warmup_steps: 500
  fp16: true
  gradient_accumulation_steps: 1
  early_stopping_patience: 3
  output_dir: outputs/models
  logging_dir: outputs/logs
  save_total_limit: 2
  log_every_n_steps: 50

logging:
  use_wandb: false
  wandb_project: medical-ner
  csv_log: true

inference:
  device: auto                      # auto | cpu | cuda
  batch_size: 32